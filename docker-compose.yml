services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - mysql_url=mysql+mysqldb://usuariozinho:senha123@db:3306/basezinha
      - secret_key=senha_super_secreta
      - otlp_collector=http://otel-collector:4317
      - OTEL_SERVICE_NAME=sitezinho
      - OTEL_SERVICE_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      otel-collector:
        condition: service_started
      db:
        condition: service_started
        restart: true
    volumes:
      - ./logs.txt:/app/logs.txt
    restart: on-failure
    command: opentelemetry-instrument flask --app sitezinho run --host=0.0.0.0

  db:
    image: mariadb:12.2.2-noble
    environment:
      MARIADB_DATABASE: basezinha
      MARIADB_USER: usuariozinho
      MARIADB_PASSWORD: senha123
      MARIADB_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    container_name: example-prometheus
    ports:
      - 9090:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  otel-collector:
    image: otel/opentelemetry-collector
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - 8889:8889 # Prometheus metrics exposed by the Collector
      - 4317:4317 # OTLP gRPC receiver
      - 4318:4318 # OTLP http receiver
    environment:
      - OTEL_SERVICE_NAME="sitezinho"    

volumes:
  mysql_data:
